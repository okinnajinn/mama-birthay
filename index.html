<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С Днём Рождения Мамуль</title>

<style>

body{
    margin:0;
    background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #fbc2eb 100%);
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;
    font-family: 'Georgia', serif;
    text-align:center;
    overflow:hidden;
    min-height:100vh;
    touch-action: none;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1{
    margin-top:40px;
    font-size:65px;
    color:#fff;
    text-shadow: 
        2px 2px 0px #d4a5a5,
        4px 4px 10px rgba(0,0,0,0.2),
        0 0 20px rgba(255,255,255,0.3);
    font-weight: bold;
    letter-spacing: 3px;
    position: relative;
    z-index: 2;
}

.gallery{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    position:relative;
    z-index:2;
}

.photo{
    position:relative;
    transition: transform 0.3s ease;
}

.photo:hover {
    transform: scale(1.05) rotate(2deg);
}

.photo img{
    width:280px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    border: 4px solid rgba(255,255,255,0.4);
    transition: all 0.3s ease;
}

.photo:hover img {
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    border-color: rgba(255,255,255,0.7);
}

.heart{
    position:absolute;
    font-size:35px;
    animation: heartbeat 1.5s ease-in-out infinite;
}

.heart.top{
    top:-15px;
    left:-15px;
}

.heart.bottom{
    bottom:-15px;
    right:-15px;
    animation-delay: 0.7s;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

.love-text {
    margin-top: 30px;
    font-size: 50px;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    font-weight: bold;
    position: relative;
    z-index: 2;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.05); opacity: 1; }
}

canvas#fireworks{
    position:fixed;
    bottom:0;
    left:0;
    pointer-events:none;
    z-index: 1;
}

canvas#hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index: 10;
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>
<canvas id="hearts"></canvas>

<h1>С ДНЁМ РОЖДЕНИЯ МАМУЛЬ</h1>

<div class="gallery">

    <div class="photo">
    <span class="heart top">❤️</span>
    <span class="heart bottom">💕</span>
    <img src="tri.jpg">
    </div>

    <div class="photo">
    <span class="heart top">💖</span>
    <span class="heart bottom">❤️</span>
    <img src="dva.jpg">
    </div>

    <div class="photo">
    <span class="heart top">💕</span>
    <span class="heart bottom">💖</span>
    <img src="gqgnqmgnqwpogqwpofpwqnfqwnfoqwfnpqw.jpg">
    </div>

</div>

<div class="love-text">Я ЛЮБЛЮ ТЕБЯ</div>

<script>

// Фейерверк - букет роз
const fwCanvas = document.getElementById("fireworks")
const fwCtx = fwCanvas.getContext("2d")

function resizeFW(){
    fwCanvas.width = window.innerWidth
    fwCanvas.height = window.innerHeight
}
resizeFW()
window.addEventListener("resize",resizeFW)

let roses = []
let stems = []
let launched = false

// Цвета роз
const roseColors = [
    { main: '#ff1744', dark: '#d50000', light: '#ff8a80' }, // Красная
    { main: '#f50057', dark: '#c51162', light: '#ff80ab' }, // Розовая
    { main: '#e91e63', dark: '#ad1457', light: '#f48fb1' }, // Малиновая
    { main: '#ff4081', dark: '#f50057', light: '#ff80ab' }, // Ярко-розовая
    { main: '#ec407a', dark: '#d81b60', light: '#f8bbd9' }  // Светло-розовая
]

class Rose {
    constructor(x, y, color, size, layer) {
        this.x = x
        this.y = y
        this.targetX = x
        this.targetY = y
        this.startX = Math.random() * fwCanvas.width
        this.startY = fwCanvas.height + 50
        this.color = color
        this.size = size
        this.layer = layer
        this.progress = 0
        this.speed = 0.01 + Math.random() * 0.015
        this.rotation = Math.random() * Math.PI * 2
        this.petals = []
        this.createPetals()
    }

    createPetals() {
        const petalCount = 8 + Math.floor(Math.random() * 4)
        for(let i=0; i<petalCount; i++) {
            const angle = (Math.PI * 2 / petalCount) * i + Math.random() * 0.5
            this.petals.push({
                angle: angle,
                size: this.size * (0.6 + Math.random() * 0.4),
                offset: Math.random() * 5
            })
        }
    }

    update() {
        if(this.progress < 1) {
            this.progress += this.speed
            const ease = 1 - Math.pow(1 - this.progress, 3)
            this.x = this.startX + (this.targetX - this.startX) * ease
            this.y = this.startY + (this.targetY - this.startY) * ease
        }
    }

    draw() {
        // Рисуем лепестки
        this.petals.forEach((petal, i) => {
            const px = this.x + Math.cos(petal.angle + this.rotation) * petal.offset
            const py = this.y + Math.sin(petal.angle + this.rotation) * petal.offset
            
            // Тень лепестка
            fwCtx.beginPath()
            fwCtx.ellipse(px, py, petal.size, petal.size*0.7, petal.angle + this.rotation, 0, Math.PI*2)
            fwCtx.fillStyle = this.color.dark
            fwCtx.fill()

            // Основной лепесток
            fwCtx.beginPath()
            fwCtx.ellipse(px-2, py-2, petal.size*0.9, petal.size*0.6, petal.angle + this.rotation, 0, Math.PI*2)
            fwCtx.fillStyle = this.color.main
            fwCtx.fill()

            // Блик
            fwCtx.beginPath()
            fwCtx.ellipse(px-3, py-3, petal.size*0.4, petal.size*0.3, petal.angle + this.rotation, 0, Math.PI*2)
            fwCtx.fillStyle = this.color.light
            fwCtx.fill()
        })

        // Центр розы
        fwCtx.beginPath()
        fwCtx.arc(this.x, this.y, this.size*0.3, 0, Math.PI*2)
        fwCtx.fillStyle = this.color.dark
        fwCtx.fill()
        
        fwCtx.beginPath()
        fwCtx.arc(this.x-1, this.y-1, this.size*0.2, 0, Math.PI*2)
        fwCtx.fillStyle = '#5d4037'
        fwCtx.fill()
    }
}

class Stem {
    constructor(x, y, height) {
        this.x = x
        this.y = y
        this.targetHeight = height
        this.currentHeight = 0
        this.progress = 0
        this.speed = 0.02 + Math.random() * 0.01
        this.curve = (Math.random() - 0.5) * 30
        this.leaves = []
        this.createLeaves()
    }

    createLeaves() {
        const leafCount = 2 + Math.floor(Math.random() * 2)
        for(let i=0; i<leafCount; i++) {
            this.leaves.push({
                y: 0.3 + Math.random() * 0.5,
                side: i % 2 === 0 ? 1 : -1,
                size: 15 + Math.random() * 10
            })
        }
    }

    update() {
        if(this.progress < 1) {
            this.progress += this.speed
            const ease = 1 - Math.pow(1 - this.progress, 2)
            this.currentHeight = this.targetHeight * ease
        }
    }

    draw() {
        const endY = this.y + this.currentHeight
        const cpX = this.x + this.curve * (this.currentHeight / this.targetHeight)
        
        // Ствол
        fwCtx.beginPath()
        fwCtx.moveTo(this.x, this.y)
        fwCtx.quadraticCurveTo(cpX, this.y + this.currentHeight/2, this.x + this.curve*0.3, endY)
        fwCtx.strokeStyle = '#4caf50'
        fwCtx.lineWidth = 4
        fwCtx.stroke()

        // Листья
        this.leaves.forEach(leaf => {
            if(this.currentHeight > this.targetHeight * leaf.y) {
                const ly = this.y + this.currentHeight * leaf.y
                const lx = this.x + this.curve * leaf.y + leaf.side * 20
                
                fwCtx.beginPath()
                fwCtx.ellipse(lx, ly, leaf.size, leaf.size*0.4, leaf.side * 0.5, 0, Math.PI*2)
                fwCtx.fillStyle = '#66bb6a'
                fwCtx.fill()
                
                // Жилка
                fwCtx.beginPath()
                fwCtx.moveTo(lx - leaf.side*leaf.size*0.7, ly)
                fwCtx.lineTo(lx + leaf.side*leaf.size*0.7, ly)
                fwCtx.strokeStyle = '#2e7d32'
                fwCtx.lineWidth = 1
                fwCtx.stroke()
            }
        })
    }
}

function createBouquet() {
    const centerX = fwCanvas.width / 2
    const bottomY = fwCanvas.height - 100
    
    // Создаём розы в форме букета (пирамидка)
    const rows = 4
    const rosesPerRow = [3, 4, 3, 2]
    const rowSizes = [25, 30, 35, 40]
    
    for(let row=0; row<rows; row++) {
        const count = rosesPerRow[row]
        const y = bottomY - 80 - row * 70
        const startX = centerX - (count-1) * 50
        
        for(let i=0; i<count; i++) {
            const x = startX + i * 100 + (Math.random()-0.5)*20
            const color = roseColors[Math.floor(Math.random() * roseColors.length)]
            const size = rowSizes[row] + Math.random() * 5
            
            roses.push(new Rose(x, y, color, size, row))
            
            // Ствол для каждой розы
            const stemHeight = 150 + row * 40 + Math.random() * 30
            stems.push(new Stem(x, y, stemHeight))
        }
    }
    
    // Добавляем розы по бокам (ниже)
    for(let side=-1; side<=1; side+=2) {
        for(let i=0; i<2; i++) {
            const x = centerX + side * (180 + i*40) + (Math.random()-0.5)*30
            const y = bottomY - 40 - i*50
            const color = roseColors[Math.floor(Math.random() * roseColors.length)]
            const size = 28 + Math.random() * 8
            
            roses.push(new Rose(x, y, color, size, 5))
            stems.push(new Stem(x, y, 120 + i*30))
        }
    }
}

setTimeout(() => {
    createBouquet()
    launched = true
}, 800)

function updateFW(){
    fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height)
    
    if(launched) {
        // Рисуем стволы сначала (под розами)
        stems.forEach(s => {
            s.update()
            s.draw()
        })
        
        // Рисуем розы
        roses.forEach(r => {
            r.update()
            r.draw()
        })
    }
    
    requestAnimationFrame(updateFW)
}
updateFW()

// Интерактивные сердечки
const hCanvas = document.getElementById("hearts")
const hCtx = hCanvas.getContext("2d")

function resizeH(){
    hCanvas.width = window.innerWidth
    hCanvas.height = window.innerHeight
}
resizeH()
window.addEventListener("resize",resizeH)

const heartEmojis = ['❤️', '💖', '💕', '💗', '💓', '💝', '🤍', '💘']
let hearts = []

class Heart {
    constructor(x, y, isPermanent = false) {
        this.x = x
        this.y = y
        this.emoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)]
        this.size = Math.random() * 20 + 15
        this.speedX = (Math.random() - 0.5) * 3
        this.speedY = (Math.random() - 0.5) * 3
        this.rotation = Math.random() * Math.PI * 2
        this.rotationSpeed = (Math.random() - 0.5) * 0.05
        this.life = 1
        this.decay = isPermanent ? 0.0005 : 0.003
        this.bounce = 0.8
        this.isPermanent = isPermanent
    }

    update() {
        this.x += this.speedX
        this.y += this.speedY
        this.rotation += this.rotationSpeed

        if (this.x < 0 || this.x > hCanvas.width) {
            this.speedX *= -this.bounce
            this.x = Math.max(0, Math.min(this.x, hCanvas.width))
        }
        if (this.y < 0 || this.y > hCanvas.height) {
            this.speedY *= -this.bounce
            this.y = Math.max(0, Math.min(this.y, hCanvas.height))
        }

        this.speedX *= 0.995
        this.speedY *= 0.995

        if (this.isPermanent && this.life < 0.3) {
            this.life = 0.3
            this.decay = 0
        } else {
            this.life -= this.decay
        }
    }

    draw() {
        hCtx.save()
        hCtx.globalAlpha = this.life
        hCtx.translate(this.x, this.y)
        hCtx.rotate(this.rotation)
        hCtx.font = `${this.size}px Arial`
        hCtx.textAlign = 'center'
        hCtx.textBaseline = 'middle'
        hCtx.fillText(this.emoji, 0, 0)
        hCtx.restore()
    }
}

for(let i=0; i<25; i++) {
    hearts.push(new Heart(Math.random()*hCanvas.width, Math.random()*hCanvas.height, true))
}

function addHearts(x, y) {
    for(let i=0; i<5; i++) {
        const heart = new Heart(x, y, false)
        heart.speedX = (Math.random() - 0.5) * 12
        heart.speedY = (Math.random() - 0.5) * 12
        heart.decay = 0.002
        hearts.push(heart)
    }
}

hCanvas.addEventListener('click', (e) => {
    addHearts(e.clientX, e.clientY)
})

hCanvas.addEventListener('touchstart', (e) => {
    e.preventDefault()
    for(let touch of e.touches) {
        addHearts(touch.clientX, touch.clientY)
    }
}, {passive: false})

let mouseX = -1000
let mouseY = -1000

hCanvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX
    mouseY = e.clientY
})

hCanvas.addEventListener('touchmove', (e) => {
    e.preventDefault()
    if(e.touches.length > 0) {
        mouseX = e.touches[0].clientX
        mouseY = e.touches[0].clientY
        if(Math.random() > 0.8) {
            addHearts(mouseX, mouseY)
        }
    }
}, {passive: false})

function updateHearts() {
    hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height)

    hearts.forEach(h => {
        const dx = h.x - mouseX
        const dy = h.y - mouseY
        const dist = Math.sqrt(dx*dx + dy*dy)
        
        if(dist < 80 && dist > 0) {
            const force = (80 - dist) / 80 * 1.5
            h.speedX += (dx / dist) * force
            h.speedY += (dy / dist) * force
        }
    })

    hearts = hearts.filter(h => h.life > 0.01)
    hearts.forEach(h => {
        h.update()
        h.draw()
    })

    if(hearts.length < 20) {
        hearts.push(new Heart(Math.random()*hCanvas.width, Math.random()*hCanvas.height, true))
    }

    requestAnimationFrame(updateHearts)
}
updateHearts()

</script>

</body>
</html>
